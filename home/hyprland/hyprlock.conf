# Hyprlock configuration
# See https://wiki.hyprland.org/Hypr-Eco/hyprlock/

general {
  no_fade_in = false
  no_fade_out = false
  ignore_empty_input = true
  hide_cursor = true
  grace = 5
}

background {
  path = ~/Pictures/wallpapers/wallpaper.jpg
  blur_passes = 3
  blur_size = 8
  brightness = 0.5
}

input-field {
  monitor =
  size = 300, 50
  outline_thickness = 2
  dots_size = 0.2
  dots_center = true
  outer_color = rgba(89b4faee)
  inner_color = rgba(30, 30, 46ee)
  font_color = rgba(cdd6f4ee)
  fade_on_empty = true
  placeholder_text = <i>Password...</i>
  hide_input = false
  position = 0, -120
  halign = center
  valign = center
}

label {
  monitor =
  text = <b>Locked</b>
  font_size = 24
  color = rgba(cdd6f4ee)
  position = 0, -60
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date '+%H:%M')"
  font_size = 64
  color = rgba(cdd6f4ee)
  position = 0, 60
  halign = center
  valign = center
}
